[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false
fuzz = { runs = 10000 }
invariant = { runs = 256 }

[profile.default.fmt]
line_length = 120
tab_width = 4
bracket_spacing = true

[rpc_endpoints]
polygon = "${POLYGON_RPC_URL}"
amoy = "${AMOY_RPC_URL}"
localhost = "http://127.0.0.1:8545"

[etherscan]
polygon = { key = "${POLYGONSCAN_API_KEY}", chain = 137 }
amoy = { key = "${POLYGONSCAN_API_KEY}", chain = 80002 }
