[profile.default]
src = "src"
out = "out"
libs = ["lib"]
auto_detect_solc = true
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
# via_ir enables the Yul-based IR compilation pipeline, required for the
# Deploy.s.sol full-stack script (deploys 13 contracts + wiring in a single
# run(), exceeding the legacy pipeline's stack depth).
via_ir = true
ffi = false
fuzz = { runs = 10000 }
invariant = { runs = 256 }
extra_output = ["storageLayout"]
fs_permissions = [{ access = "read", path = "./out"}]

[profile.default.fmt]
line_length = 120
tab_width = 4
bracket_spacing = true

[rpc_endpoints]
polygon = "${POLYGON_RPC_URL}"
amoy = "${AMOY_RPC_URL}"
localhost = "http://127.0.0.1:8545"

[etherscan]
polygon = { key = "${POLYGONSCAN_API_KEY}", chain = 137 }
amoy = { key = "${POLYGONSCAN_API_KEY}", chain = 80002 }
